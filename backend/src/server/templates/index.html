<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCRAS Security Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <!-- Vis.js for Graph -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Ionicons for Icons -->
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script>
        window.TCRAS_CONFIG = {
            serverUrl: "{{ server_url }}",
            apiKey: "{{ api_key }}"
        };
    </script>
</head>

<body class="bg-gray-900 text-white font-sans overflow-hidden">

    <!-- Navbar -->
    <nav
        class="glass absolute top-0 w-full z-50 px-6 py-3 flex justify-between items-center bg-gray-900/80 border-b border-gray-700/50">
        <div class="flex items-center space-x-4">
            <div class="relative">
                <div class="w-3 h-3 bg-blue-500 rounded-full animate-ping absolute top-0 right-0"></div>
                <div
                    class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <ion-icon name="shield-checkmark" class="text-xl"></ion-icon>
                </div>
            </div>
            <div>
                <h1
                    class="text-xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-white">
                    TCRAS <span class="text-blue-500 font-extralight">Sentinel</span></h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Network Integrity Monitor</p>
            </div>
        </div>

        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2 bg-gray-800/50 px-3 py-1 rounded-full border border-gray-700">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-xs text-green-400 font-mono">LIVE FEED</span>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-500" id="clock">00:00:00</p>
            </div>
        </div>
    </nav>

    <!-- Main Grid -->
    <div class="grid grid-cols-4 h-screen pt-20 pb-4 px-4 gap-4">

        <!-- Sidebar: Stats & Logs -->
        <aside class="col-span-1 flex flex-col space-y-4">

            <!-- Risk Card -->
            <div class="glass p-5 rounded-xl border-l-4 border-blue-500 relative overflow-hidden transition-all duration-300"
                id="status-card">
                <div class="flex justify-between items-start z-10 relative">
                    <div>
                        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Current Threat Level</p>
                        <h2 class="text-2xl font-bold" id="risk-status">SECURE</h2>
                    </div>
                    <ion-icon name="analytics-outline" class="text-2xl text-blue-500"></ion-icon>
                </div>
                <!-- Animated Background Mesh -->
                <div class="absolute -right-10 -bottom-10 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl"></div>
            </div>

            <!-- Alert Box (Hidden by default) -->
            <div id="alert-box"
                class="hidden glass p-5 rounded-xl border border-red-500 bg-red-900/10 shadow-[0_0_20px_rgba(239,68,68,0.2)]">
                <div class="flex items-center space-x-3 mb-2">
                    <span class="relative flex h-3 w-3">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                    </span>
                    <h3 class="text-red-500 font-bold tracking-wider">CRITICAL ALERT</h3>
                </div>
                <p id="alert-filename" class="text-sm text-gray-300 mb-3 break-all font-mono">...</p>
                <div class="w-full bg-gray-800 rounded-full h-1.5 mb-1 overflow-hidden">
                    <div id="alert-score-bar" class="bg-red-500 h-1.5 rounded-full transition-all duration-1000"
                        style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-xs text-red-400 mt-1">
                    <span>Risk Score</span>
                    <span id="alert-score-text" class="font-bold">0</span>
                </div>
            </div>

            <!-- Network Risk Chart -->
            <div class="glass p-4 rounded-xl border border-gray-700/50">
                <h3 class="text-xs uppercase text-gray-400 font-bold mb-2">Network Risk Profile</h3>
                <div class="relative h-32">
                    <canvas id="riskChart"></canvas>
                </div>
            </div>

            <!-- Logs Feed -->
            <div class="glass flex-1 rounded-xl p-4 flex flex-col min-h-0 border-t border-gray-700/50">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-semibold text-gray-300 flex items-center space-x-2">
                        <ion-icon name="list"></ion-icon>
                        <span>Event Log</span>
                    </h3>
                    <span class="text-xs text-gray-600 bg-gray-800 px-2 py-0.5 rounded" id="log-count">0</span>
                </div>
                <div id="event-log" class="overflow-y-auto pr-2 space-y-3 scrollbar-hide flex-1">
                    <!-- Logs injected here -->
                </div>
            </div>
        </aside>

        <!-- Center: Graph -->
        <main
            class="col-span-2 glass rounded-xl relative overflow-hidden border border-gray-700/50 shadow-2xl flex flex-col">
            <div
                class="absolute top-4 left-4 z-10 bg-gray-900/50 px-3 py-1 rounded backdrop-blur border border-gray-700">
                <h2 class="text-sm font-bold text-gray-200">Transfer Map</h2>
            </div>
            <div id="network-graph" class="w-full h-full cursor-move"></div>

            <!-- Floating Overlay -->
            <div class="absolute bottom-6 right-6 flex space-x-4 pointer-events-none">
                <div class="glass px-4 py-2 rounded-lg flex flex-col items-center border border-gray-700/50">
                    <span class="text-xs text-gray-400">NODES</span>
                    <span class="text-xl font-bold text-blue-400" id="node-count">0</span>
                </div>
                <div class="glass px-4 py-2 rounded-lg flex flex-col items-center border border-gray-700/50">
                    <span class="text-xs text-gray-400">LINKS</span>
                    <span class="text-xl font-bold text-indigo-400" id="edge-count">0</span>
                </div>
            </div>
        </main>

        <!-- Right: Device Table -->
        <aside class="col-span-1 glass rounded-xl p-4 flex flex-col border-l border-gray-700/50">
            <h3 class="text-sm font-semibold text-gray-300 mb-4 flex items-center">
                <ion-icon name="laptop-outline" class="mr-2"></ion-icon> Device Risk
            </h3>
            <div class="overflow-y-auto flex-1">
                <table class="w-full text-left text-xs text-gray-400">
                    <thead>
                        <tr class="border-b border-gray-700 text-gray-500">
                            <th class="pb-2">IP Addr</th>
                            <th class="pb-2 text-right">Risk Score</th>
                        </tr>
                    </thead>
                    <tbody id="device-table-body" class="divide-y divide-gray-800">
                        <!-- JS Injected -->
                    </tbody>
                </table>
            </div>
        </aside>

    </div>

    <!-- Clock Script -->
    <script>
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
    <script src="/static/app.js"></script>
</body>

</html>
